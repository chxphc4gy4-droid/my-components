<script>
// Supabase REST Client — 零依赖，直接用 fetch
const SUPABASE_URL = 'https://ajiinnljnfbzeqnugcji.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqaWlubmxqbmZiemVxbnVnY2ppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzMTc3NjQsImV4cCI6MjA5Njg5Mzc2NH0.UfelqCdx56KRX18MUi7jXN9U_Q8NDH6Pa3YyzOUpGL8';

function mkBuilder(table) {
  const hdrs = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };
  let q = [];
  let ord = [];
  let op = { method: 'GET', body: null };

  function buildUrl() {
    let u = SUPABASE_URL + '/rest/v1/' + table;
    let params = [...q];
    if (ord.length) params.push('order=' + ord.join(','));
    if (params.length) u += '?' + params.join('&');
    return u;
  }

  function chain() {
    return { select, insert, update, delete: del, upsert, eq, neq, lt, is, order, single, then };
  }

  function select(cols) { q.push('select=' + encodeURIComponent(cols)); return chain(); }
  function insert(data) { op = { method: 'POST', body: JSON.stringify(data), upsert: true }; return chain(); }
  function update(data) { op = { method: 'PATCH', body: JSON.stringify(data) }; return chain(); }
  function del() { op = { method: 'DELETE', body: null }; return chain(); }
  function upsert(data) { q.push('on_conflict=key'); op = { method: 'POST', body: JSON.stringify(data), upsert: true }; return chain(); }
  function eq(col, val) { q.push(encodeURIComponent(col) + '=eq.' + encodeURIComponent(val)); return chain(); }
  function neq(col, val) { q.push(encodeURIComponent(col) + '=neq.' + encodeURIComponent(val)); return chain(); }
  function lt(col, val) { q.push(encodeURIComponent(col) + '=lt.' + encodeURIComponent(val)); return chain(); }
  function is(col, val) { q.push(encodeURIComponent(col) + '=is.' + encodeURIComponent(val === null || val === undefined ? 'null' : String(val))); return chain(); }
  function order(col, opts) { ord.push(encodeURIComponent(col) + (opts && opts.ascending === false ? '.desc' : '.asc')); return chain(); }
  function single() { q.push('limit=1'); return chain(); }

  async function then(resolve) {
    // If select wasn't called, add default select
    if (!q.some(x => x.startsWith('select=')) && op.method === 'GET') {
      q.push('select=*');
    }
    const url = buildUrl();
    const heads = { ...hdrs };
    if (op.upsert) heads['Prefer'] = 'resolution=merge-duplicates';
    const fetchOpts = { method: op.method, headers: heads };
    if (op.body) fetchOpts.body = op.body;
    const r = await fetch(url, fetchOpts);
    if (!r.ok) {
      const txt = await r.text();
      if (r.status !== 204 && r.status !== 406) console.error('Supabase error:', r.status, txt);
      if (op.method === 'GET') resolve({ data: [], error: txt });
      else resolve(op.method === 'DELETE' ? { error: null } : { data: null, error: txt });
      return;
    }
    if (r.status === 204) { resolve({ error: null }); return; }
    const result = await r.json();
    const singleResult = q.includes('limit=1');
    if (op.method === 'GET' || op.method === 'POST') {
      resolve({ data: singleResult ? (result[0] || null) : result, error: null });
    } else {
      resolve({ error: null });
    }
  }

  return chain();
}

const sb = {
  from: mkBuilder,
  storage: {
    from(bucket) {
      const base = SUPABASE_URL + '/storage/v1';
      return {
        async upload(path, file) {
          const r = await fetch(base + '/object/' + bucket + '/' + path, { method: 'POST', headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }, body: file });
          if (!r.ok) { console.error(await r.text()); return { data: null, error: r.status }; }
          return { data: await r.json(), error: null };
        },
        getPublicUrl(path) {
          return { publicUrl: base + '/object/public/' + bucket + '/' + path };
        }
      };
    }
  }
};

.detail-info .meta-item { display: flex; align-items: center; gap: 4px; color: var(--text-dim); }
.detail-section { margin-top:20px; }
.detail-section h4 { font-size:0.82rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:8px; padding-bottom:6px; border-bottom:1px solid var(--border); }
.detail-files { display:flex; flex-wrap:wrap; gap:8px; }
.detail-file-card {
  display: flex; align-items: center; gap: 8px; padding: 10px 14px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius-sm); cursor: pointer;
  transition: var(--transition); font-size: 0.82rem;
  text-decoration: none; color: var(--text);
}
.detail-file-card:hover { border-color:var(--primary); background:var(--bg-hover); }
.detail-file-card .file-icon { font-size:1.5rem; }

/* Toast */
.toast-container { position: fixed; top: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
.toast {
  padding: 12px 20px; border-radius: var(--radius-sm); color: #fff;
  font-size: 0.85rem; font-weight: 500; animation: slideIn 0.3s ease;
  box-shadow: var(--shadow); max-width: 360px;
}
@keyframes slideIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }
.toast.success { background:#238636; }
.toast.error { background:#da3633; }
.toast.info { background:#1f6feb; }

/* ========== Settings Modal ========== */
.bg-presets { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.bg-preset {
  width: 48px; height: 48px; border-radius: var(--radius-sm);
  border: 2px solid var(--border); cursor: pointer; transition: var(--transition);
  position: relative; overflow: hidden;
}
.bg-preset:hover { border-color:var(--text); transform:scale(1.08); }
.bg-preset.selected { border-color:var(--primary); box-shadow:0 0 0 2px rgba(88,166,255,0.3); }
.bg-preset.selected::after { content:'✓'; position:absolute; bottom:2px; right:4px; color:#fff; font-size:12px; font-weight:700; text-shadow:0 1px 2px rgba(0,0,0,0.5); }

/* ========== SVG Icon Picker ========== */
.icon-picker-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(44px, 1fr));
  gap: 4px; max-height: 200px; overflow-y: auto; padding: 6px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg-card); margin-top: 8px;
}
.icon-picker-item {
  width: 44px; height: 44px; display: flex; align-items: center;
  justify-content: center; border-radius: var(--radius-sm);
  cursor: pointer; transition: var(--transition); padding: 4px;
  border: 2px solid transparent; background: var(--bg-hover);
}
.icon-picker-item:hover { background:var(--border); border-color:var(--text-dim); }
.icon-picker-item.selected { border-color:var(--primary); background:rgba(88,166,255,0.2); }
.icon-picker-item svg { width:24px; height:24px; display:block; color: var(--text-bright); }
.icon-picker-item .emoji { font-size:1.2rem; line-height:1; }

/* Category Manager */
.cat-manager-list { display:flex; flex-direction:column; gap:6px; }
.cat-manager-item {
  display: flex; align-items: center; gap: 10px; padding: 8px 12px;
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm);
}
.cat-manager-item .color-input { width:28px; height:28px; border:none; border-radius:50%; cursor:pointer; padding:0; }
.cat-manager-item .name-input { flex:1; background:transparent; border:none; color:var(--text); font-size:0.9rem; padding:4px; }
.cat-manager-item .name-input:focus { background:var(--bg-input); border-radius:4px; }
.cat-manager-item .icon-btn {
  width: 36px; height: 36px; display: flex; align-items: center;
  justify-content: center; border-radius: var(--radius-sm);
  background: var(--bg-hover); cursor: pointer; transition: var(--transition);
  padding: 4px; position: static;
}
.cat-manager-item .icon-btn:hover { background:var(--border); }
.cat-manager-item .icon-btn svg { width:22px; height:22px; }
.cat-manager-item .icon-btn .emoji { font-size:1.1rem; }
.cat-manager-item button.del-btn {
  background: transparent; color: var(--text-dim); padding: 4px 8px;
  border-radius: 4px; font-size: 0.8rem; transition: var(--transition);
}
.cat-manager-item button.del-btn:hover { color:var(--red); background:rgba(248,81,73,0.1); }
.icon-picker-popup {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  z-index: 350;
  background: var(--bg-modal); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px; width: 340px;
  max-height: 80vh; overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
}

/* Confirm */
.confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 150; }
.confirm-box { background: var(--bg-modal); border: 1px solid var(--border); border-radius: 12px; padding: 24px; max-width: 400px; text-align: center; box-shadow: var(--shadow); animation: slideUp 0.2s ease; }
.confirm-box h3 { margin-bottom:8px; color:var(--text-bright); }
.confirm-box p { color:var(--text-dim); font-size:0.85rem; margin-bottom:20px; }
.confirm-box .btn-row { display:flex; gap:8px; justify-content:center; }
.btn-danger { padding: 8px 20px; border-radius: var(--radius-sm); background: var(--red); color: #fff; font-weight: 600; font-size: 0.85rem; transition: var(--transition); }
.btn-danger:hover { background:#cf222e; }

/* Local backup badge */
.local-backup-badge {
  font-size: 0.7rem; color: var(--green);
  display: flex; align-items: center; gap: 4px;
}

/* ========== Password Lock Modal ========== */
.password-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  backdrop-filter: blur(6px); display: flex;
  align-items: center; justify-content: center;
  z-index: 200; animation: fadeIn 0.2s ease;
}
.password-box {
  background: var(--bg-modal); border: 1px solid var(--border);
  border-radius: 12px; padding: 28px 24px; max-width: 380px; width: 90%;
  text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  animation: slideUp 0.25s ease;
}
.password-box h3 { color: var(--text-bright); margin-bottom: 6px; font-size: 1.1rem; }
.password-box .pw-hint { color: var(--text-dim); font-size: 0.78rem; margin-bottom: 16px; }
.password-box .pw-hint .badge {
  display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem;
  margin: 0 3px;
}
.password-box .pw-hint .badge.temp { background: rgba(248,129,73,0.15); color: var(--orange); }
.password-box .pw-hint .badge.admin { background: rgba(63,185,80,0.15); color: var(--green); }
.password-box input {
  width: 100%; padding: 10px 14px; border-radius: var(--radius-sm);
  background: var(--bg-input); border: 1px solid var(--border);
  color: var(--text); font-size: 1rem; text-align: center;
  letter-spacing: 0.1em; margin-bottom: 12px; transition: var(--transition);
}
.password-box input:focus { border-color: var(--border-focus); }
.password-box input.error { border-color: var(--red); animation: shake 0.4s ease; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}
.password-box .pw-btns { display: flex; gap: 8px; justify-content: center; }
.password-box .pw-btns button { padding: 9px 20px; border-radius: var(--radius-sm); font-size: 0.85rem; }
.password-box .pw-error { color: var(--red); font-size: 0.75rem; margin-top: 8px; display: none; }

/* ========== Responsive / Mobile ========== */
@media (max-width:768px) {
  body { flex-direction: column; }

  /* Sidebar becomes a drawer */
  .sidebar {
    position: fixed; top: 0; left: -280px; bottom: 0;
    width: 260px; min-width: 0; z-index: 90;
    padding: 20px 14px; overflow-y: auto;
    transition: left 0.3s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 4px 0 30px rgba(0,0,0,0.6);
    border-right: 1px solid var(--border);
  }
  .sidebar.open { left: 0; }
  .sidebar-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 89; display: none;
  }
  .sidebar-backdrop.show { display: block; }

  .sidebar-logo { font-size: 1.1rem; margin-bottom: 16px; }
  .sidebar-nav button { padding: 10px 12px; font-size: 0.9rem; }
  .sidebar-nav button .count { display: inline; }
  .sidebar-section-title { display: block; }
  .category-list { display: flex; flex-direction: column; }
  .category-item { padding: 8px 12px; font-size: 0.85rem; }
  .sidebar-divider { display: block; }
  .sidebar-actions { flex-direction: column; }
  .sidebar-actions button { font-size: 0.82rem; padding: 10px 12px; }
  .sync-status { margin-bottom: 12px; margin-left: 0; }

  /* Top bar */
  .main { padding-top: 0; }
  .toolbar {
    padding: 10px 14px; gap: 8px; flex-wrap: nowrap;
    align-items: center; border-bottom: 1px solid var(--border);
  }
  .toolbar .search-box { flex: 1; min-width: 0; }
  .toolbar .search-box input { font-size: 0.85rem; padding: 8px 12px; }
  .toolbar .sort-select { font-size: 0.75rem; padding: 7px 8px; }
  .toolbar .btn-ghost { display: none; }
  .toolbar .btn-primary { font-size: 0.78rem; padding: 7px 12px; white-space: nowrap; }

  /* Hamburger button */
  .hamburger {
    display: flex; width: 36px; height: 36px;
    align-items: center; justify-content: center;
    background: transparent; color: var(--text);
    font-size: 1.3rem; flex-shrink: 0;
    border-radius: var(--radius-sm); transition: var(--transition);
  }
  .hamburger:hover { background: var(--bg-hover); }
  @media (min-width:769px) { .hamburger { display: none; } }

  /* Logo in toolbar */
  .toolbar-logo {
    display: flex; align-items: center; gap: 4px;
    font-size: 0.9rem; font-weight: 700; color: var(--primary);
    flex-shrink: 0;
  }
  @media (min-width:769px) { .toolbar-logo { display: none; } }

  .stats-bar { padding: 8px 14px; gap: 8px; }
  .stat-card { padding: 10px 12px; min-width: 0; flex: 1; }
  .stat-card .stat-value { font-size: 1.2rem; }
  .stat-card .stat-label { font-size: 0.65rem; }
  .content-area { padding: 0 10px 10px; }
  .component-grid { grid-template-columns: 1fr; gap: 10px; }
  .card-img { height: 140px; }
  .card-body { padding: 12px; }
  .card-title { font-size: 0.95rem; }
  .card-actions { padding: 6px 12px 12px; }
  .card-actions button { padding: 6px 14px; font-size: 0.78rem; }

  .detail-header { flex-direction: column; }
  .detail-img { width: 100%; height: 200px; }
  .form-row { flex-direction: column; }

  /* Modals full screen on mobile */
  .modal {
    width: 100%; max-width: 100%; height: 100vh;
    max-height: 100vh; border-radius: 0; margin: 0;
  }
  .modal-body { padding: 16px; }

  /* Bottom tab bar */
  .mobile-tabs {
    display: flex;
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--bg-sidebar); border-top: 1px solid var(--border);
    z-index: 50; padding: 5px 8px 8px;
    justify-content: space-around;
  }
  .mobile-tab {
    display: flex; flex-direction: column; align-items: center;
    gap: 2px; background: transparent; color: var(--text-dim);
    font-size: 0.62rem; padding: 6px 10px; border-radius: var(--radius-sm);
    transition: var(--transition);
  }
  .mobile-tab.active { color: var(--primary); }
  .mobile-tab .tab-icon { font-size: 1.3rem; }
  .content-area { padding-bottom: 80px; }
  .toast-container { top: auto; bottom: 90px; right: 10px; }

  /* Camera button */
  .btn-camera {
    width: 52px; height: 52px; bottom: 80px; right: 16px;
    font-size: 1.3rem;
  }

  /* File upload area smaller */
  .file-upload-area { padding: 16px; }
  .file-upload-area p { font-size: 0.78rem; }

  /* Password box */
  .password-box { padding: 24px 18px; }
  .password-box h3 { font-size: 1rem; }
  .password-box input { font-size: 0.95rem; padding: 10px; }
}

@media (min-width:769px) {
  .mobile-tabs { display: none; }
  .hamburger { display: none; }
  .toolbar-logo { display: none; }
}

/* Camera button for mobile */
.btn-camera {
  background: var(--primary-dim); color: #fff;
  width: 56px; height: 56px; border-radius: 50%;
  position: fixed; bottom: 24px; right: 24px;
  font-size: 1.5rem; display: flex; align-items: center;
  justify-content: center; box-shadow: 0 4px 20px rgba(31,111,235,0.5);
  z-index: 40; transition: var(--transition);
}
.btn-camera:hover { transform: scale(1.1); background: #1a5dcd; }
@media (min-width:769px) { .btn-camera { display: none; } }
</style>
</head>
<body>

<!-- ==================== Sidebar ==================== -->
<aside class="sidebar">
  <div class="sidebar-logo"><span class="icon">🔌</span> 嵌入式仓库</div>
  <div class="sync-status" id="sync-indicator">
    <span class="dot online" id="sync-dot"></span>
    <span id="sync-text">☁️ 在线同步</span>
  </div>
  <nav class="sidebar-nav">
    <button class="active" data-filter="all" onclick="filterByCategory('all')">
      📦 全部 <span class="count" id="count-all">0</span>
    </button>
    <button data-filter="trash" onclick="showRecycleBin()" id="nav-trash">
      🗑️ 回收站 <span class="count" id="count-trash">0</span>
    </button>
  </nav>
  <div class="sidebar-divider"></div>
  <div class="sidebar-section-title">📂 分类</div>
  <div class="category-list" id="category-nav-list"></div>
  <div class="sidebar-divider"></div>
  <div class="sidebar-actions">
    <button onclick="openCategoryManager()">⚙️ 管理分类</button>
    <button class="btn-settings" onclick="openSettingsModal()">🎨 背景设置</button>
    <button class="btn-export" onclick="exportData()">📥 导出备份</button>
    <button class="btn-export" onclick="document.getElementById('import-file').click()">📤 导入备份</button>
    <button class="btn-export" onclick="saveLocalBackup()" id="btn-local-backup">💾 本地备份</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
    <div style="margin-top:4px;">
      <span class="local-backup-badge" id="local-backup-badge" style="display:none">✅ 已选择本地备份目录</span>
    </div>
  </div>
</aside>

<!-- ==================== Main ==================== -->
<main class="main">
  <div class="toolbar">
    <button class="hamburger" onclick="toggleSidebar()" title="菜单">☰</button>
    <span class="toolbar-logo">🔌 嵌入式仓库</span>
    <div class="search-box">
      <input type="text" id="search-input" placeholder="🔍 搜索元件…" oninput="renderComponents()">
    </div>
    <select class="sort-select" id="sort-select" onchange="renderComponents()">
      <option value="newest">🕐 最新</option>
      <option value="oldest">📅 最早</option>
      <option value="name">🔤 A-Z</option>
      <option value="updated">✏️ 最近修改</option>
    </select>
    <button class="btn-ghost" onclick="resetFilters()">🔄 重置</button>
    <button class="btn-primary" onclick="openAddModal()">➕ 添加</button>
  </div>
  <div class="stats-bar">
    <div class="stat-card"><div class="stat-value" id="stat-total">0</div><div class="stat-label">📦 元件总数</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-categories">0</div><div class="stat-label">📂 分类</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-recent">0</div><div class="stat-label">🆕 本月新增</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-files">0</div><div class="stat-label">📎 附件</div></div>
  </div>
  <div class="content-area"><div class="component-grid" id="component-grid"></div></div>
</main>

<!-- Mobile bottom tabs -->
<div class="mobile-tabs" id="mobile-tabs">
  <button class="mobile-tab" onclick="toggleSidebar()"><span class="tab-icon">☰</span>菜单</button>
  <button class="mobile-tab" onclick="openAddModal()"><span class="tab-icon">➕</span>添加</button>
  <button class="mobile-tab" onclick="filterByCategory('all')"><span class="tab-icon">📦</span>全部</button>
  <button class="mobile-tab" onclick="showRecycleBin()"><span class="tab-icon">🗑️</span>回收站</button>
</div>

<!-- Floating camera button (mobile) -->
<button class="btn-camera" id="btn-camera" onclick="quickPhotoAdd()" title="快速拍照添加">📷</button>

<!-- Modal templates (same as original) -->
<!-- Add/Edit Modal -->
<div id="form-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeFormModal()">
  <div class="modal">
    <div class="modal-header">
      <h2 id="form-modal-title">添加新元件</h2>
      <button class="modal-close" onclick="closeFormModal()">✕</button>
    </div>
    <div class="modal-body">
      <form id="component-form" onsubmit="saveComponent(event)">
        <input type="hidden" id="edit-id" value="">
        <div class="form-group"><label>名称 *</label><input type="text" id="input-name" required placeholder="例如：STM32F103C8T6"></div>
        <div class="form-row">
          <div class="form-group"><label>分类</label><select id="input-category" onchange="renderPackageSelect()"></select></div>
          <div class="form-group"><label>封装 *</label><div style="display:flex;gap:6px;"><select id="input-package" required style="flex:1"></select><button type="button" class="btn-sm" onclick="openPackageManager()" title="管理封装">⚙️</button></div></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>数量 *</label><input type="number" id="input-quantity" value="1" min="0" required></div>
          <div class="form-group"><label>购买链接 <span class="optional">(可选)</span></label><input type="url" id="input-link" placeholder="https://..."></div>
        </div>
        <div class="form-group"><label>照片 * <span style="color:var(--red)">(必填)</span></label>
          <div class="file-upload-area" id="photo-drop-zone" onclick="document.getElementById('photo-input').click()">
            <div class="upload-icon" id="photo-preview-icon">📷</div>
            <p id="photo-placeholder">点击或拖拽照片 <span style="color:var(--red)">*必填</span></p>
            <p class="hint">拍一张实物照片</p>
          </div>
          <input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none" onchange="handlePhotoSelect(event)">
          <div id="photo-preview" style="margin-top:8px;"></div>
          <button type="button" class="btn-sm" id="photo-clear-btn" style="margin-top:6px;display:none;color:var(--red);" onclick="clearPhoto()">✕ 移除照片</button>
        </div>
        <div class="form-group"><label>附件 <span class="optional">(PDF、Word等)</span></label>
          <div class="file-upload-area" id="file-drop-zone" onclick="document.getElementById('file-input').click()">
            <div class="upload-icon">📁</div><p>点击或拖拽上传</p><p class="hint">PDF、DOC、DOCX、TXT 等</p>
          </div>
          <input type="file" id="file-input" multiple accept="*/*" style="display:none" onchange="handleFileSelect(event)">
          <div class="file-list" id="file-list"></div>
        </div>
        <div class="form-group">
          <label>标签 <span class="optional">(可选，回车添加)</span></label>
          <div class="tag-input-wrapper" id="tag-wrapper" onclick="document.getElementById('tag-input').focus()">
            <span id="tag-chips"></span><input type="text" id="tag-input" placeholder="添加标签…" onkeydown="handleTagKey(event)">
          </div>
        </div>
        <div class="form-group"><label>存放位置 <span class="optional">(可选)</span></label><input type="text" id="input-location" placeholder="例如：抽屉A-3、书柜二层"></div>
        <div style="display:flex;gap:8px;justify-content:flex-end;">
          <button type="button" class="btn-ghost" onclick="closeFormModal()">取消</button>
          <button type="submit" class="btn-primary" id="form-submit-btn">💾 保存</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div id="detail-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeDetailModal()">
  <div class="modal" style="max-width:720px;">
    <div class="modal-header">
      <h2>📋 元件详情</h2>
      <div style="display:flex;gap:8px;">
        <button class="btn-ghost" id="detail-edit-btn" onclick="editFromDetail()">✏️ 编辑</button>
        <button class="modal-close" onclick="closeDetailModal()">✕</button>
      </div>
    </div>
    <div class="modal-body" id="detail-content"></div>
  </div>
</div>

<!-- Category Manager Modal -->
<div id="cat-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeCategoryManager()">
  <div class="modal" style="max-width:540px;">
    <div class="modal-header">
      <h2>⚙️ 管理分类</h2>
      <button class="modal-close" onclick="closeCategoryManager()">✕</button>
    </div>
    <div class="modal-body">
      <div class="cat-manager-list" id="cat-manager-list"></div>
      <button class="btn-ghost" style="width:100%;margin-top:12px;justify-content:center;display:flex;padding:10px;" onclick="addNewCategory()">➕ 添加新分类</button>
      <button class="btn-primary" style="width:100%;margin-top:8px;justify-content:center;display:flex;" onclick="saveCategories()">💾 保存</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div id="settings-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeSettingsModal()">
  <div class="modal" style="max-width:520px;">
    <div class="modal-header">
      <h2>🎨 背景设置</h2>
      <button class="modal-close" onclick="closeSettingsModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label>背景类型</label>
        <select id="bg-type" onchange="onBgTypeChange()">
          <option value="color">🎨 纯色</option>
          <option value="gradient">🌈 渐变</option>

/* ================================================================
   PASSWORD LOCK
   密码 A (chen456789) — 一次性，仅本次操作有效
   密码 B (Guanmeiting2017@) — 20分钟内免密
   ================================================================ */
const PW_TEMP = 'chen456789';
const PW_ADMIN = 'Guanmeiting2017@';
const PW_SESSION_KEY = 'pw_admin_granted_at';
const PW_SESSION_DURATION = 20 * 60 * 1000; // 20 minutes
let pwCallback = null; // 待执行的回调函数

function isAdminSessionActive() {
  const grantedAt = sessionStorage.getItem(PW_SESSION_KEY);
  if (!grantedAt) return false;
  return (Date.now() - parseInt(grantedAt)) < PW_SESSION_DURATION;
}

function grantAdminSession() {
  sessionStorage.setItem(PW_SESSION_KEY, Date.now().toString());
}

// 需要密码才能执行的操作：返回 true 表示通过，false 表示取消
async function requirePassword() {
  // 管理密码在 20 分钟内 → 直接通过
  if (isAdminSessionActive()) return true;

  return new Promise((resolve) => {
    pwCallback = resolve;
    document.getElementById('password-overlay').style.display = 'flex';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').classList.remove('error');
    document.getElementById('pw-error').style.display = 'none';
    setTimeout(() => document.getElementById('pw-input').focus(), 100);
  });
}

function submitPassword() {
  const input = document.getElementById('pw-input');
  const pw = input.value.trim();

  if (pw === PW_ADMIN) {
    // 管理密码 → 20分钟有效
    grantAdminSession();
    document.getElementById('password-overlay').style.display = 'none';
    if (pwCallback) { const cb = pwCallback; pwCallback = null; cb(true); }
    showToast('🔓 管理员已确认，20分钟内免密', 'success');
  } else if (pw === PW_TEMP) {
    // 临时密码 → 仅本次有效
    document.getElementById('password-overlay').style.display = 'none';
    if (pwCallback) { const cb = pwCallback; pwCallback = null; cb(true); }
    showToast('✅ 操作已授权（单次有效）', 'info');
  } else {
    // 密码错误
    input.classList.add('error');
    document.getElementById('pw-error').style.display = '';
    setTimeout(() => input.classList.remove('error'), 400);
    input.value = '';
    input.focus();
  }
}

function cancelPassword() {
  document.getElementById('password-overlay').style.display = 'none';
  if (pwCallback) { const cb = pwCallback; pwCallback = null; cb(false); }
}

let isOnline = true;

async function checkOnline() {
  try {
    const { error } = await sb.from('components').select('*').single();
    isOnline = !error || error === 406;
  } catch { isOnline = false; }
  updateSyncIndicator();
  return isOnline;
}

function updateSyncIndicator() {
  const dot = document.getElementById('sync-dot');
  const text = document.getElementById('sync-text');
  if (isOnline) {
    dot.className = 'dot online';
    text.textContent = '☁️ 在线同步';
  } else {
    dot.className = 'dot offline';
    text.textContent = '📡 离线';
  }
}

// --- Components ---
async function getAllComponents() {
  if (!sb) return [];
  const { data, error } = await sb.from('components').select('*').order('created_at', { ascending: false });
  if (error) { console.error(error); return []; }
  return data;
}

async function getActiveComponents() {
  const all = await getAllComponents();
  return all.filter(c => !c.is_deleted);
}

async function getTrashedComponents() {
  const all = await getAllComponents();
  return all.filter(c => c.is_deleted);
}

async function getComponent(id) {
  if (!sb) return null;
  const { data, error } = await sb.from('components').select('*').eq('id', id).single();
  if (error) { console.error(error); return null; }
  return data;
}

async function addComponent(comp) {
  if (!sb) return null;
  const { data, error } = await sb.from('components').insert(comp).select().single();
  if (error) { console.error(error); return null; }
  return data;
}

async function updateComponent(id, comp) {
  if (!sb) return;
  const { error } = await sb.from('components').update(comp).eq('id', id);
  if (error) console.error(error);
}

async function softDeleteComponent(id) {
  if (!sb) return;
  const { error } = await sb.from('components').update({ is_deleted: true, deleted_at: new Date().toISOString() }).eq('id', id);
  if (error) console.error(error);
}

async function restoreComponent(id) {
  if (!sb) return;
  const { error } = await sb.from('components').update({ is_deleted: false, deleted_at: null }).eq('id', id);
  if (error) console.error(error);
}

async function permanentDeleteComponent(id) {
  if (!sb) return;
  const { error } = await sb.from('components').delete().eq('id', id);
  if (error) console.error(error);
}

async function autoPurgeTrash() {
  if (!sb) return;
  try {
    const sevenDaysAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString();
    const { error } = await sb.from('components').delete().eq('is_deleted', true).lt('deleted_at', sevenDaysAgo);
    if (error) console.error(error);
  } catch {}
}

// --- Photo Upload ---
async function uploadPhoto(file) {
  if (!sb) return null;
  const fileName = `photo_${Date.now()}_${Math.random().toString(36).slice(2,8)}.${file.name.split('.').pop()}`;
  const { data, error } = await sb.storage.from('photos').upload(fileName, file, { cacheControl: '3600', upsert: false });
  if (error) { console.error(error); return null; }
  const { data: urlData } = sb.storage.from('photos').getPublicUrl(data.path);
  return urlData.publicUrl;
}

// --- File Upload ---
async function uploadFile(file) {
  if (!sb) return null;
  const fileName = `file_${Date.now()}_${Math.random().toString(36).slice(2,8)}_${file.name}`;
  const { data, error } = await sb.storage.from('files').upload(fileName, file, { cacheControl: '3600', upsert: false });
  if (error) { console.error(error); return null; }
  const { data: urlData } = sb.storage.from('files').getPublicUrl(data.path);
  return { name: file.name, type: file.type, size: file.size, url: urlData.publicUrl };
}

async function getPackages(category) {
  if (!sb) return [];
  let q = sb.from('packages').select('*');
  if (category) q = q.eq('category', category);
  q = q.order('name');
  const { data, error } = await q;
  if (error) { console.error(error); return []; }
  return data;
}

async function addPackageRecord(pkg) {
  if (!sb) return;
  const { error } = await sb.from('packages').insert(pkg);
  if (error) console.error(error);
}

async function deletePackageRecord(id) {
  if (!sb) return;
  const { error } = await sb.from('packages').delete().eq('id', id);
  if (error) console.error(error);
}

// --- Settings ---
async function getSetting(key) {
  if (!sb) return null;
  const { data, error } = await sb.from('settings').select('value').eq('key', key).single();
  if (error || !data) return null;
  return data.value;
}

async function setSetting(key, value) {
  if (!sb) return;
  const { error } = await sb.from('settings').upsert({ key, value }, { onConflict: 'key' });
  if (error) console.error(error);
}

    bgValue: await getSetting('bgValue') || DEFAULT_SETTINGS.bgValue,
  };
}

async function saveBgSettings(type, value) {
  await setSetting('bgType', type);
  await setSetting('bgValue', value);
}

function applyBackground(type, value) {
  const body = document.body;
  body.classList.remove('has-bg-image');
  body.style.backgroundImage = '';
  body.style.backgroundColor = '';
  switch (type) {
    case 'color': body.style.backgroundColor = value; break;
    case 'gradient': body.style.backgroundImage = value; break;
    case 'image':
      body.style.backgroundImage = `url(${value})`;
      body.classList.add('has-bg-image');
      break;
  }
}

async function loadAndApplyBg() {
  const { bgType, bgValue } = await getBgSettings();
  applyBackground(bgType, bgValue);
}

/* ================================================================

   ================================================================ */
function renderCatIconHTML(cat, size) {
  const s = size || 18;
  const iconType = cat.icon_type || cat.iconType || 'svg';
  const icon = cat.icon || '其他';
  const iconSvg = cat.icon_svg || cat.iconSvg;
  if (iconType === 'svg' && icon && SVG_ICONS[icon]) {
    return `<span class="cat-icon-svg" style="color:${cat.color};width:${s}px;height:${s}px">${SVG_ICONS[icon]}</span>`;
  }
  if (iconType === 'customSvg' && iconSvg) {
    return `<span class="cat-icon-svg" style="color:${cat.color};width:${s}px;height:${s}px">${iconSvg}</span>`;
  }
  return `<span>${icon || '📦'}</span>`;
}

function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div'); div.textContent = str; return div.innerHTML;
}

function escapeAttr(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showToast(msg, type = 'info') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`; toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => { toast.remove(); }, 3000);
}

function showLoading() {
  const div = document.createElement('div');
  div.className = 'loading-overlay'; div.id = 'loading-overlay';
  div.innerHTML = '<div class="spinner"></div>';
  document.body.appendChild(div);
}

function hideLoading() {
  const el = document.getElementById('loading-overlay');
  if (el) el.remove();
}

   ================================================================ */
async function renderComponents() {
  const grid = document.getElementById('component-grid');
  if (currentFilter === 'trash') return renderRecycleBin();

  let comps = await getActiveComponents();
  const cats = await getCategories();
  const searchTerm = document.getElementById('search-input').value.toLowerCase().trim();

  if (currentFilter !== 'all') comps = comps.filter(c => c.category === currentFilter);
  if (searchTerm) {
    comps = comps.filter(c => {
      const tags = c.tags || [];
      const s = [c.name, c.category, c.location, ...tags].join(' ').toLowerCase();
      return s.includes(searchTerm);
    });
  }

  currentSort = document.getElementById('sort-select').value;
  comps.sort((a, b) => {
    switch (currentSort) {
      case 'newest': return (b.created_at || '').localeCompare(a.created_at || '');
      case 'oldest': return (a.created_at || '').localeCompare(b.created_at || '');
      case 'name': return (a.name || '').localeCompare(b.name || '', 'zh');
      case 'updated': return (b.updated_at || '').localeCompare(a.updated_at || '');
      default: return 0;
    }
  });

  if (comps.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><h3>还没有元件</h3><p>点击"添加元件"开始记录吧！</p></div>`;
  } else {
    grid.innerHTML = comps.map(comp => {
      const cat = cats.find(c => c.name === comp.category) || {};
      const thumbUrl = comp.photo_url || getThumbUrl(comp);
      const imgHtml = thumbUrl
        ? `<img src="${thumbUrl}" alt="${escapeHtml(comp.name)}" loading="lazy">`
        : `<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;">${renderCatIconHTML(cat, 60)}</div>`;
      return `<div class="component-card" onclick="openDetailModal('${comp.id}')">
        <div class="card-img">${imgHtml}</div>
        <div class="card-body">
          <div class="card-title">
            ${escapeHtml(comp.name)}
            ${cat.name ? `<span class="card-category" style="background:${cat.color}22;color:${cat.color}">${renderCatIconHTML(cat,14)} ${escapeHtml(cat.name)}</span>` : ''}
          </div>
          <div class="card-meta">
            ${comp.package_type ? `<span>📐 ${escapeHtml(comp.package_type)}</span>` : ''}
            <span class="qty-ctrl" onclick="event.stopPropagation()">
              <button class="qty-minus" onclick="changeQty('${comp.id}',-1,event)">−</button>
              <span class="qty-val">${comp.quantity || 0}</span>
              <button class="qty-plus" onclick="changeQty('${comp.id}',1,event)">+</button>
            </span>
            ${comp.location ? `<span>📍 ${escapeHtml(comp.location)}</span>` : ''}
            ${comp.files && comp.files.length > 0 ? `<span>📎 ${comp.files.length}</span>` : ''}
          </div>
        </div>
        <div class="card-actions" onclick="event.stopPropagation()">
          <button onclick="openEditModal('${comp.id}')">✏️ 编辑</button>
          <button class="btn-del" onclick="confirmDelete('${comp.id}','${escapeAttr(comp.name)}')">🗑 删除</button>

    }).join('');
  }
  updateStats();

function getThumbUrl(comp) {
  if (!comp.files || !Array.isArray(comp.files)) return null;
  const imgFile = comp.files.find(f => f.type && f.type.startsWith('image/'));
  return imgFile ? imgFile.url : null;
}

function getRemainingTime(deletedAt) {
  const now = new Date();
  const deleted = new Date(deletedAt);
  const sevenDays = 7 * 24 * 60 * 60 * 1000;
  const expiresAt = new Date(deleted.getTime() + sevenDays);
  const remaining = expiresAt - now;
  if (remaining <= 0) return { expired: true, text: '即将清除' };
  const days = Math.floor(remaining / (24 * 60 * 60 * 1000));
  const hours = Math.floor((remaining % (24 * 60 * 60 * 1000)) / (60 * 60 * 1000));
  return { expired: false, days, hours, text: `剩余 ${days}天${hours}小时` };
}

          <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.3);"><span style="font-size:2.5rem;">🗑️</span></div>

          <div class="card-meta">

            <span>📅 删除于 ${new Date(comp.deleted_at).toLocaleDateString('zh-CN')}</span>
          </div>
          <div class="recycle-countdown${remaining.expired ? ' expiring' : ''}">⏳ ${remaining.text}</div>
        </div>

   ================================================================ */
function handlePhotoSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  editingPhotoFile = file;
  editingPhotoUrl = null;
  const reader = new FileReader();
  reader.onload = (e) => { renderPhotoPreview(e.target.result); };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function clearPhoto() {
  editingPhotoFile = null;
  editingPhotoUrl = null;
  renderPhotoPreview(null);
}

function renderPhotoPreview(dataUrl) {
  const icon = document.getElementById('photo-preview-icon');
  const placeholder = document.getElementById('photo-placeholder');
  const preview = document.getElementById('photo-preview');
  const clearBtn = document.getElementById('photo-clear-btn');
  const currentUrl = dataUrl || editingPhotoUrl;
  if (currentUrl) {
    if (icon) icon.style.display = 'none';
    placeholder.textContent = '✅ 照片已选择，点击可更换';
    placeholder.style.color = 'var(--green)';
    preview.innerHTML = `<img src="${currentUrl}" style="width:100%;max-height:180px;object-fit:cover;border-radius:var(--radius-sm);border:1px solid var(--border);">`;
    if (clearBtn) clearBtn.style.display = '';
  } else {
    if (icon) icon.style.display = '';
    placeholder.innerHTML = '点击或拖拽照片 <span style="color:var(--red)">*必填</span>';
    placeholder.style.color = '';
    preview.innerHTML = '';
    if (clearBtn) clearBtn.style.display = 'none';
  }
}

function setupPhotoDrop() {
  const zone = document.getElementById('photo-drop-zone');
  if (!zone) return;
  zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => { zone.classList.remove('drag-over'); });
  zone.addEventListener('drop', (e) => {
    e.preventDefault(); zone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
      editingPhotoFile = file; editingPhotoUrl = null;
      const reader = new FileReader();
      reader.onload = (ev) => { renderPhotoPreview(ev.target.result); };
      reader.readAsDataURL(file);
    }
  });
}

async function saveComponent(event) {
  event.preventDefault();
  if (!await requirePassword()) return;
  const id = document.getElementById('edit-id').value;
  const now = new Date().toISOString();

  showLoading();

  try {
    // Upload photo if new file selected
    let photoUrl = editingPhotoUrl || null;
    if (editingPhotoFile) {
      photoUrl = await uploadPhoto(editingPhotoFile);
      if (!photoUrl) { hideLoading(); showToast('❌ 照片上传失败', 'error'); return; }
    }

    // Upload new files (those with data blobs, not URLs)
    const uploadedFiles = [];
    for (const f of editingFiles) {
      if (f.url) {
        uploadedFiles.push(f); // already uploaded
      } else if (f.data) {
        // Convert base64 to blob and upload
        const blob = dataURLToBlob(f.data);
        const result = await uploadFile(new File([blob], f.name, { type: f.type }));
        if (result) uploadedFiles.push(result);
      }
    }

    const comp = {
      name: document.getElementById('input-name').value.trim(),
      category: document.getElementById('input-category').value,
      package_type: document.getElementById('input-package').value,
      quantity: parseInt(document.getElementById('input-quantity').value) || 0,
      purchase_link: document.getElementById('input-link').value.trim(),
      location: document.getElementById('input-location').value.trim(),
      photo_url: photoUrl,
      tags: editingTags,
      files: uploadedFiles,
      updated_at: now,
    };

    if (!comp.name) { hideLoading(); showToast('请输入元件名称', 'error'); return; }
    if (!photoUrl && !id) { hideLoading(); showToast('请上传元器件照片', 'error'); return; }
    if (!comp.package_type) { hideLoading(); showToast('请选择封装类型', 'error'); return; }

    if (id) {
      await updateComponent(id, comp);
      showToast('✅ 元件已更新', 'success');
    } else {
      comp.created_at = now;
      comp.is_deleted = false;
      await addComponent(comp);
      showToast('✅ 元件已添加', 'success');
    }

    closeFormModal();
    renderComponents();
  } catch (e) {
    console.error(e);
    showToast('❌ 保存失败: ' + e.message, 'error');
  }
  hideLoading();
}

function dataURLToBlob(dataURL) {
  const parts = dataURL.split(',');
  const mime = parts[0].match(/:(.*?);/)[1];
  const bytes = atob(parts[1]);
  const arr = new Uint8Array(bytes.length);
  for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
  return new Blob([arr], { type: mime });
}

/* Tags */
function handleTagKey(event) {
  if (event.key === 'Enter') {
    event.preventDefault();
    const input = document.getElementById('tag-input');
    const tag = input.value.trim();
    if (tag && !editingTags.includes(tag)) { editingTags.push(tag); renderTagChips(); }
    input.value = '';
  }
}

function removeTag(index) { editingTags.splice(index, 1); renderTagChips(); }

function renderTagChips() {
  document.getElementById('tag-chips').innerHTML = editingTags.map((t, i) =>
    `<span class="tag-chip">${escapeHtml(t)} <button type="button" onclick="removeTag(${i})">×</button></span>`).join('');
}

/* File handling */
function handleFileSelect(event) { addFiles(Array.from(event.target.files)); event.target.value = ''; }

function addFiles(files) {
  for (const file of files) {
    const reader = new FileReader();
    reader.onload = (e) => {
      editingFiles.push({
        id: 'f_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8),
        name: file.name, type: file.type, size: file.size,
        data: e.target.result, url: null
      });
      renderFileList();
    };
    reader.readAsDataURL(file);
  }
}

function removeFile(fileId) { editingFiles = editingFiles.filter(f => f.id !== fileId); renderFileList(); }

function renderFileList() {
  const container = document.getElementById('file-list');
  if (editingFiles.length === 0) { container.innerHTML = ''; return; }
  container.innerHTML = editingFiles.map(f => {
    const isImage = f.type && f.type.startsWith('image/');
    const displayUrl = f.url || f.data;
    return `<div class="file-item">
      ${isImage ? `<img class="file-thumb" src="${displayUrl}" alt="">` : ''}
      <span class="file-icon">${isImage ? '🖼' : getFileIcon(f.name)}</span>
      <span class="file-name" title="${escapeHtml(f.name)}">${escapeHtml(f.name)}</span>
      <span class="file-size">${formatSize(f.size)}</span>
      <button type="button" class="file-remove" onclick="removeFile('${f.id}')">✕</button></div>`;
  }).join('');
}

function getFileIcon(fn) {
  const m = { pdf:'📕', doc:'📘', docx:'📘', txt:'📄', xlsx:'📊', csv:'📊', zip:'📦', rar:'📦' };
  return m[(fn.split('.').pop() || '').toLowerCase()] || '📎';
}

function formatSize(b) {
  if (!b) return ''; if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1048576).toFixed(1) + ' MB';
}

   DETAIL MODAL
   ================================================================ */
async function openDetailModal(id) {
  const comp = await getComponent(id);
  if (!comp) return;
  currentDetailId = id;
  const cats = await getCategories();
  const cat = cats.find(c => c.name === comp.category) || {};
  const thumbUrl = comp.photo_url || getThumbUrl(comp);
  const imgHtml = thumbUrl
    ? `<img src="${thumbUrl}" alt="${escapeHtml(comp.name)}">`
    : `<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;">${renderCatIconHTML(cat, 64)}</div>`;

  let filesHtml = '<p style="color:var(--text-dim);font-size:0.85rem;">暂无附件</p>';
  if (comp.files && comp.files.length > 0) {
    filesHtml = '<div class="detail-files">' + comp.files.map(f => {
      const isImage = f.type && f.type.startsWith('image/');
      return isImage
        ? `<a href="${f.url}" target="_blank" class="detail-file-card"><img src="${f.url}" style="width:48px;height:48px;object-fit:cover;border-radius:4px;"><div><div style="color:var(--text);font-size:0.82rem;">${escapeHtml(f.name)}</div><div style="color:var(--text-dim);font-size:0.7rem;">${formatSize(f.size)} · 查看大图</div></div></a>`
        : `<a href="${f.url}" target="_blank" class="detail-file-card"><span class="file-icon">${getFileIcon(f.name)}</span><div><div style="color:var(--text);font-size:0.82rem;">${escapeHtml(f.name)}</div><div style="color:var(--text-dim);font-size:0.7rem;">${formatSize(f.size)} · 下载</div></div></a>`;
    }).join('') + '</div>';
  }

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-header">
      <div class="detail-img">${imgHtml}</div>
      <div class="detail-info">
        <h2>${escapeHtml(comp.name)}</h2>
        <div class="meta-row">
          ${cat.name ? `<span class="meta-item">${renderCatIconHTML(cat)} ${escapeHtml(cat.name)}</span>` : ''}
          ${comp.package_type ? `<span class="meta-item">📐 ${escapeHtml(comp.package_type)}</span>` : ''}
          ${comp.quantity > 0 ? `<span class="meta-item">📦 数量：${comp.quantity}</span>` : ''}
          ${comp.location ? `<span class="meta-item">📍 ${escapeHtml(comp.location)}</span>` : ''}
        </div>
        <div class="meta-row">
          ${comp.purchase_link ? `<span class="meta-item">🔗 <a href="${escapeAttr(comp.purchase_link)}" target="_blank" style="color:var(--primary)">购买链接</a></span>` : ''}
        </div>
        ${comp.tags && comp.tags.length ? `<div class="meta-row">${comp.tags.map(t => `<span class="tag-chip">${escapeHtml(t)}</span>`).join(' ')}</div>` : ''}
      </div>
    </div>
    <div class="detail-section"><h4>📎 附件 (${comp.files ? comp.files.length : 0})</h4>${filesHtml}</div>`;
  document.getElementById('detail-modal').style.display = 'flex';
}

function closeDetailModal() { document.getElementById('detail-modal').style.display = 'none'; currentDetailId = null; }

function editFromDetail() { if (currentDetailId) { closeDetailModal(); openEditModal(currentDetailId); } }

/* ================================================================
   CATEGORY MANAGER
   ================================================================ */
let editingCategories = [];

async function openCategoryManager() {
  editingCategories = await getCategories();
  renderCategoryManager();
  document.getElementById('cat-modal').style.display = 'flex';
}

function closeCategoryManager() { document.getElementById('cat-modal').style.display = 'none'; iconPickerTarget = null; }

function renderSvgIconGrid(targetIndex) {
  let html = '<div class="icon-picker-grid">';
  for (const [name, svg] of Object.entries(SVG_ICONS)) {
    const cat = editingCategories[targetIndex];
    const sel = cat.icon === name && (cat.icon_type || cat.iconType) === 'svg';
    html += `<button type="button" class="icon-picker-item${sel ? ' selected' : ''}" onclick="selectSvgIcon(${targetIndex},'${escapeAttr(name)}','svg')" title="${escapeHtml(name)}">${svg}</button>`;
  }
  for (const emoji of EMOJI_ICONS) {
    const cat = editingCategories[targetIndex];
    const sel = cat.icon === emoji && (cat.icon_type || cat.iconType) === 'emoji';
    html += `<button type="button" class="icon-picker-item${sel ? ' selected' : ''}" onclick="selectSvgIcon(${targetIndex},'${escapeAttr(emoji)}','emoji')"><span class="emoji">${emoji}</span></button>`;
  }
  html += '</div>';
  html += `<div style="margin-top:8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
    <button type="button" class="btn-sm" onclick="document.getElementById('custom-svg-input-${targetIndex}').click()">📁 上传自定义SVG</button>
    <input type="file" id="custom-svg-input-${targetIndex}" accept=".svg,image/svg+xml" style="display:none" onchange="handleCustomSvgUpload(event,${targetIndex})">
    ${editingCategories[targetIndex].icon_type === 'customSvg' || editingCategories[targetIndex].iconType === 'customSvg' ? '<button type="button" class="btn-sm" style="color:var(--red)" onclick="clearCustomSvg('+targetIndex+')">清除自定义</button>' : ''}
    </div>`;
  return html;
}

function selectSvgIcon(targetIndex, icon, iconType) {
  editingCategories[targetIndex].icon = icon;
  editingCategories[targetIndex].icon_type = iconType;
  if (iconType !== 'customSvg') editingCategories[targetIndex].icon_svg = null;
  renderCategoryManager();
}

function handleCustomSvgUpload(event, targetIndex) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    editingCategories[targetIndex].icon_svg = e.target.result;
    editingCategories[targetIndex].icon_type = 'customSvg';
    editingCategories[targetIndex].icon = file.name.replace(/\.svg$/i, '');
    renderCategoryManager();
  };
  reader.readAsText(file);
}

function clearCustomSvg(targetIndex) {
  editingCategories[targetIndex].icon_svg = null;
  editingCategories[targetIndex].icon_type = 'svg';
  editingCategories[targetIndex].icon = '其他';
  renderCategoryManager();
}

async function renderCategoryManager() {
  const container = document.getElementById('cat-manager-list');
  const dc = ['#4dabf7','#69db7c','#ffa94d','#ff6b6b','#9775fa','#3bc9db','#ffd43b','#38d9a9','#748ffc','#adb5bd','#f06595','#20c997','#e67700','#5c7cfa'];

  container.innerHTML = editingCategories.map((cat, i) => {
    const iconType = cat.icon_type || cat.iconType || 'svg';
    const icon = cat.icon || '其他';
    const iconSvg = cat.icon_svg || cat.iconSvg;
    let iconHtml = (iconType === 'svg' && icon && SVG_ICONS[icon]) ? SVG_ICONS[icon]
      : (iconType === 'customSvg' && iconSvg) ? iconSvg
      : `<span class="emoji">${icon || '📦'}</span>`;
    if (iconPickerTarget === i) {
      iconHtml += `<div class="icon-picker-popup" onclick="event.stopPropagation()">${renderSvgIconGrid(i)}</div>`;
    }
    return `<div class="cat-manager-item">
      <input type="color" class="color-input" value="${cat.color || dc[i % dc.length]}" onchange="editingCategories[${i}].color = this.value">
      <button type="button" class="icon-btn" onclick="iconPickerTarget = iconPickerTarget===${i} ? null : ${i}; renderCategoryManager();" title="选择图标">${iconHtml}</button>
      <input type="text" class="name-input" value="${escapeHtml(cat.name)}" placeholder="分类名称" onchange="editingCategories[${i}].name = this.value">
      <button type="button" class="del-btn" onclick="editingCategories.splice(${i},1); iconPickerTarget=null; renderCategoryManager()">🗑</button></div>`;
  }).join('');
}

function addNewCategory() {
  editingCategories.push({ name: '新分类', color: '#adb5bd', icon: '其他', icon_type: 'svg', sort_order: editingCategories.length });
  iconPickerTarget = null;
  renderCategoryManager();
}

async function saveCategories() {
  const cats = editingCategories.filter(c => c.name.trim()).map((c, i) => ({
    name: c.name.trim(), color: c.color, icon: c.icon || '其他',
    icon_type: c.icon_type || 'svg', icon_svg: c.icon_svg || null, sort_order: i
  }));
  await saveAllCategories(cats);
  showToast('✅ 分类已保存', 'success');
  iconPickerTarget = null; closeCategoryManager();
  renderCategories(); renderComponents();
}

/* ================================================================
   BACKGROUND SETTINGS
   ================================================================ */
async function openSettingsModal() {
  const { bgType, bgValue } = await getBgSettings();
  tempBgType = bgType;
  tempBgValue = bgValue;
  document.getElementById('bg-type').value = bgType;
  document.getElementById('bg-color').value = bgType === 'color' ? bgValue : '#0d1117';
  renderThemePresets();
  renderGradientPresets();
  updateBgUI();
  renderBgPreview();
  document.getElementById('settings-modal').style.display = 'flex';
}

function closeSettingsModal() { document.getElementById('settings-modal').style.display = 'none'; loadAndApplyBg(); }

function onBgTypeChange() {
  const type = document.getElementById('bg-type').value;
  tempBgType = type;
  if (type === 'color') { tempBgValue = document.getElementById('bg-color').value; }
  else if (type === 'gradient') { tempBgValue = GRADIENT_PRESETS[0].css; }
  updateBgUI();
  applyBackground(tempBgType, tempBgValue);
}

function updateBgUI() {
  const type = document.getElementById('bg-type').value;
  document.getElementById('bg-color-group').style.display = type === 'color' ? '' : 'none';
  document.getElementById('bg-gradient-group').style.display = type === 'gradient' ? '' : 'none';
  document.getElementById('bg-image-group').style.display = type === 'image' ? '' : 'none';
  renderThemePresets();
}

function previewBg() {
  if (document.getElementById('bg-type').value === 'color') {
    tempBgValue = document.getElementById('bg-color').value;
    applyBackground('color', tempBgValue);
  }
}

function renderThemePresets() {
  document.getElementById('theme-presets').innerHTML = COLOR_PRESETS.map(p =>
    `<button class="bg-preset${tempBgType === 'color' && tempBgValue === p.color ? ' selected' : ''}" style="background:${p.color}" title="${p.label}" onclick="selectColorPreset('${p.color}')"></button>`
  ).join('');
}

function renderGradientPresets() {
  document.getElementById('gradient-presets').innerHTML = GRADIENT_PRESETS.map((p, i) =>
    `<button class="bg-preset${tempBgType === 'gradient' && tempBgValue === p.css ? ' selected' : ''}" style="background:${p.css}" title="${p.label}" onclick="selectGradientPreset(${i})"></button>`
  ).join('');
}

function selectColorPreset(c) {
  tempBgType = 'color'; tempBgValue = c;
  document.getElementById('bg-type').value = 'color';
  document.getElementById('bg-color').value = c;
  updateBgUI();
  applyBackground('color', c);
}

function selectGradientPreset(i) {
  tempBgType = 'gradient'; tempBgValue = GRADIENT_PRESETS[i].css;
  document.getElementById('bg-type').value = 'gradient';
  updateBgUI();
  applyBackground('gradient', tempBgValue);
}

function handleBgImageSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    tempBgType = 'image'; tempBgValue = e.target.result;
    document.getElementById('bg-type').value = 'image';
    updateBgUI();
    applyBackground('image', tempBgValue);
    renderBgPreview();
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function renderBgPreview() {
  const container = document.getElementById('bg-image-preview');
  const clearBtn = document.getElementById('bg-image-clear');
  if (tempBgType === 'image' && tempBgValue && tempBgValue.startsWith('data:')) {
    container.innerHTML = `<img src="${tempBgValue}" style="width:100%;max-height:120px;object-fit:cover;border-radius:var(--radius-sm);border:1px solid var(--border);">`;
    clearBtn.style.display = '';
  } else { container.innerHTML = ''; clearBtn.style.display = 'none'; }
}

function clearBgImage() {
  tempBgType = 'color'; tempBgValue = '#0d1117';
  document.getElementById('bg-type').value = 'color';
  document.getElementById('bg-color').value = '#0d1117';
  updateBgUI();
  applyBackground('color', '#0d1117');
}

async function applyAndSaveBg() {
  if (tempBgType === 'color') tempBgValue = document.getElementById('bg-color').value;
  await saveBgSettings(tempBgType, tempBgValue);
  applyBackground(tempBgType, tempBgValue);
  showToast('✅ 背景已应用', 'success');
  closeSettingsModal();
}

async function resetBgToDefault() {
  tempBgType = 'color'; tempBgValue = '#0d1117';
  document.getElementById('bg-type').value = 'color';
  document.getElementById('bg-color').value = '#0d1117';
  applyBackground('color', '#0d1117');
  await saveBgSettings('color', '#0d1117');
  showToast('🔄 已恢复默认', 'info');
  updateBgUI();
}

/* ================================================================
   EXPORT / IMPORT / LOCAL BACKUP
   ================================================================ */
async function exportData() {
  const comps = await getAllComponents();
  const cats = await getCategories();
  const { bgType, bgValue } = await getBgSettings();
  const data = { version: 3, exportedAt: new Date().toISOString(), categories: cats, components: comps, settings: { bgType, bgValue } };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `元器件备份_${new Date().toISOString().slice(0, 10)}.json`; a.click();
  URL.revokeObjectURL(url);
  showToast('📥 备份已导出', 'success');
}

// Local backup via File System Access API
let backupDirHandle = null;

async function saveLocalBackup() {
  try {
    // Try to use previously saved directory handle
    if (!backupDirHandle) {
      backupDirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
      document.getElementById('local-backup-badge').style.display = '';
      showToast('✅ 已选择备份目录', 'success');
    }
    const comps = await getAllComponents();
    const cats = await getCategories();
    const { bgType, bgValue } = await getBgSettings();
    const data = { version: 3, exportedAt: new Date().toISOString(), categories: cats, components: comps, settings: { bgType, bgValue } };

    const fileHandle = await backupDirHandle.getFileHandle('backup.json', { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(JSON.stringify(data, null, 2));
    await writable.close();
    showToast('💾 本地备份已保存', 'success');
  } catch (e) {
    console.error(e);
    if (e.name === 'AbortError') return;
    showToast('💡 请选择 A:\\File\\元器件网站存储 目录', 'info');
    backupDirHandle = null;
    document.getElementById('local-backup-badge').style.display = 'none';
  }
}

async function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  showLoading();
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (!data.components || !data.categories) throw new Error('Invalid format');

    // Import categories
    await sb.from('categories').delete().neq('id', '00000000-0000-0000-0000-000000000000');
    for (const cat of data.categories) {
      await sb.from('categories').insert({
        name: cat.name, color: cat.color, icon: cat.icon || '其他',
        icon_type: cat.icon_type || cat.iconType || 'svg',
        icon_svg: cat.icon_svg || cat.iconSvg || null,
        sort_order: cat.sort_order || 0
      });
    }

    // Import components
    for (const comp of data.components) {
      await sb.from('components').insert({
        name: comp.name, category: comp.category, package_type: comp.package_type || comp.packageType,
        quantity: comp.quantity, location: comp.location, usage: comp.usage,
        description: comp.description, purchase_date: comp.purchase_date || comp.purchaseDate,
        purchase_link: comp.purchase_link || comp.purchaseLink,
        photo_url: comp.photo_url || comp.photo || null,
        tags: comp.tags || [], files: comp.files || [],
        is_deleted: comp.is_deleted || false,
        created_at: comp.created_at || comp.createdAt || new Date().toISOString(),
        updated_at: comp.updated_at || comp.updatedAt || new Date().toISOString(),
      });
    }

    if (data.settings) {
      await saveBgSettings(data.settings.bgType || 'color', data.settings.bgValue || '#0d1117');
      await loadAndApplyBg();
    }

    showToast(`📤 成功导入 ${data.components.length} 个元件`, 'success');
    currentFilter = 'all'; renderCategories(); renderComponents();
  } catch (e) {
    console.error(e);
    showToast('❌ 导入失败，请检查文件格式', 'error');
  }
  hideLoading();
  event.target.value = '';
}

/* ================================================================
   SETUP & KEYBOARD
   ================================================================ */
function setupFileDrop() {
  const dropZone = document.getElementById('file-drop-zone');
  if (!dropZone) return;
  dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('drag-over'); });
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault(); dropZone.classList.remove('drag-over');
    addFiles(Array.from(e.dataTransfer.files));
  });
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeFormModal(); closeDetailModal(); closeCategoryManager();
    closeSettingsModal(); closeConfirm(); closePackageManager();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault(); document.getElementById('search-input').focus();
  }
});

document.querySelectorAll('.modal').forEach(m => m.addEventListener('click', (e) => e.stopPropagation()));

document.addEventListener('click', (e) => {
  if (iconPickerTarget !== null && !e.target.closest('.icon-picker-popup') && !e.target.closest('.icon-btn')) {
    iconPickerTarget = null; renderCategoryManager();
  }
});
